<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Migration Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin {
        animation: spin 1s linear infinite;
      }
    </style>
  </head>

  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl bg-white p-4 sm:p-6 rounded-2xl shadow-xl">
      <!-- Language Toggle Button (Top Right) -->
      <div class="flex justify-end mb-2">
        <button
          type="button"
          id="langToggleBtn"
          onclick="toggleLanguage()"
          class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors text-sm font-medium text-gray-700"
          title="Switch Language"
        >
          <span class="flag-icon iconify" data-icon="emojione:flag-for-united-states"></span>
          <span class="lang-text">EN</span>
          <span class="iconify" data-icon="mdi:translate"></span>
        </button>
      </div>
      
      <!-- Steps Indicator -->
      <div class="flex items-center justify-center mb-6 px-4">
        <div class="flex items-center space-x-2">
          <div class="flex items-center">
            <div class="w-8 h-8 rounded-full text-white flex items-center justify-center text-sm font-bold" style="background-color: #1E22AA;">
              1
            </div>
            <span class="ml-2 text-sm font-medium" style="color: #1E22AA;" data-i18n="navigation.step1">Login</span>
          </div>
          <div class="w-8 h-0.5 bg-gray-300"></div>
          <div class="flex items-center">
            <div class="w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center text-sm font-bold">
              2
            </div>
            <span class="ml-2 text-sm font-medium text-gray-500" data-i18n="navigation.step2">Source</span>
          </div>
          <div class="w-8 h-0.5 bg-gray-300"></div>
          <div class="flex items-center">
            <div class="w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center text-sm font-bold">
              3
            </div>
            <span class="ml-2 text-sm font-medium text-gray-500" data-i18n="navigation.step3">Destination</span>
          </div>
          <div class="w-8 h-0.5 bg-gray-300"></div>
          <div class="flex items-center">
            <div class="w-8 h-8 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center text-sm font-bold">
              4
            </div>
            <span class="ml-2 text-sm font-medium text-gray-500" data-i18n="navigation.step4">Migrate</span>
          </div>
        </div>
      </div>

      <div class="text-center mb-6">
        <span class="iconify inline-block text-5xl text-blue-600 mb-2" data-icon="mdi:database-sync"></span>
        <h2 class="text-lg sm:text-xl font-bold" data-i18n="login.title">
          Telemetry Migration Tool
        </h2>
        <p class="text-xs text-gray-500 mt-1" data-i18n="login.subtitle">Login to both systems to begin migration</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Source Login Container -->
        <div class="border p-4 rounded-xl">
          <h3 class="font-semibold flex items-center gap-2 mb-3" style="color: #1E22AA;">
            <span class="iconify" data-icon="mdi:database-export"></span>
            <span data-i18n="login.sourceAccount">Source Account</span>
          </h3>

          <!-- Source Login Form -->
          <form id="sourceLogin" class="space-y-3">

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1" data-i18n="login.fields.username">Username</label>
            <input
              id="sourceUsername"
              class="w-full border p-2 rounded-lg text-sm"
              data-i18n-placeholder="login.fields.usernamePlaceholder"
              placeholder="Enter username"
              required
            />
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1" data-i18n="login.fields.password">Password</label>
            <div class="relative">
              <input
                id="sourcePassword"
                type="password"
                class="w-full border p-2 rounded-lg text-sm pr-10"
                data-i18n-placeholder="login.fields.passwordPlaceholder"
                placeholder="Enter password"
                required
              />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 focus:outline-none" onclick="togglePasswordVisibility('sourcePassword')">
                <span class="iconify text-lg" data-icon="mdi:eye" id="sourcePassword-icon"></span>
              </button>
            </div>
          </div>

            <button type="submit" class="w-full text-white py-2 rounded-lg text-sm flex items-center justify-center gap-2" style="background-color: #1E22AA;">
              <span class="iconify" data-icon="mdi:login"></span>
              <span data-i18n="login.buttons.loginSource">Login Source</span>
            </button>

            <p id="sourceMsg" class="text-xs"></p>
          </form>

          <!-- Source Logged In State (Hidden by default) -->
          <div id="sourceLoggedIn" class="hidden">
            <div class="rounded-lg p-4" style="background-color: #F0F0FF; border: 1px solid #1E22AA;">
              <div class="flex items-center gap-2 mb-3" style="color: #1E22AA;">
                <span class="iconify text-xl" data-icon="mdi:check-circle"></span>
                <span class="font-semibold" data-i18n="login.status.connected">Connected</span>
              </div>
              <div class="space-y-1 text-sm">
                <div class="flex items-center gap-2 text-gray-700">
                  <span class="iconify" data-icon="mdi:account"></span>
                  <span class="font-medium" data-i18n="login.status.username">Username:</span>
                  <span id="sourceUsernameDisplay" class="text-gray-900"></span>
                </div>
              </div>
              <button onclick="changeSourceAccount()" class="mt-3 w-full bg-white py-2 rounded-lg text-sm flex items-center justify-center gap-2 hover:opacity-80" style="border: 1px solid #1E22AA; color: #1E22AA;">
                <span class="iconify" data-icon="mdi:account-switch"></span>
                <span data-i18n="login.buttons.changeAccount">Change Account</span>
              </button>
            </div>
          </div>
        </div>

        <!-- Destination Login Container -->
        <div class="border p-4 rounded-xl">
          <h3 class="font-semibold flex items-center gap-2 mb-3" style="color: #E5005A;">
            <span class="iconify" data-icon="mdi:database-import"></span>
            <span data-i18n="login.destinationAccount">Destination Account</span>
          </h3>

          <!-- Destination Login Form -->
          <form id="destLogin" class="space-y-3">

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1" data-i18n="login.fields.username">Username</label>
            <input
              id="destUsername"
              class="w-full border p-2 rounded-lg text-sm"
              data-i18n-placeholder="login.fields.usernamePlaceholder"
              placeholder="Enter username"
              required
            />
          </div>

          <div>
            <label class="block text-xs font-medium text-gray-700 mb-1" data-i18n="login.fields.password">Password</label>
            <div class="relative">
              <input
                id="destPassword"
                type="password"
                class="w-full border p-2 rounded-lg text-sm pr-10"
                data-i18n-placeholder="login.fields.passwordPlaceholder"
                placeholder="Enter password"
                required
              />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-400 hover:text-gray-600 focus:outline-none" onclick="togglePasswordVisibility('destPassword')">
                <span class="iconify text-lg" data-icon="mdi:eye" id="destPassword-icon"></span>
              </button>
            </div>
          </div>

            <button type="submit" class="w-full text-white py-2 rounded-lg text-sm flex items-center justify-center gap-2" style="background-color: #E5005A;">
              <span class="iconify" data-icon="mdi:login"></span>
              <span data-i18n="login.buttons.loginDestination">Login Destination</span>
            </button>

            <p id="destMsg" class="text-xs"></p>
          </form>

          <!-- Destination Logged In State (Hidden by default) -->
          <div id="destLoggedIn" class="hidden">
            <div class="rounded-lg p-4" style="background-color: #FFF0F7; border: 1px solid #E5005A;">
              <div class="flex items-center gap-2 mb-3" style="color: #E5005A;">
                <span class="iconify text-xl" data-icon="mdi:check-circle"></span>
                <span class="font-semibold" data-i18n="login.status.connected">Connected</span>
              </div>
              <div class="space-y-1 text-sm">
                <div class="flex items-center gap-2 text-gray-700">
                  <span class="iconify" data-icon="mdi:account"></span>
                  <span class="font-medium" data-i18n="login.status.username">Username:</span>
                  <span id="destUsernameDisplay" class="text-gray-900"></span>
                </div>
              </div>
              <button onclick="changeDestAccount()" class="mt-3 w-full bg-white py-2 rounded-lg text-sm flex items-center justify-center gap-2 hover:opacity-80" style="border: 1px solid #E5005A; color: #E5005A;">
                <span class="iconify" data-icon="mdi:account-switch"></span>
                <span data-i18n="login.buttons.changeAccount">Change Account</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Next Button (Hidden until both logged in) -->
      <div id="nextButtonContainer" class="hidden mt-6 flex justify-center">
        <button onclick="goToSourcePage()" class="text-white px-8 py-3 rounded-lg font-semibold flex items-center gap-2 hover:shadow-lg transform hover:scale-105 transition" style="background: linear-gradient(to right, #1E22AA, #E5005A);">
          <span data-i18n="login.buttons.continue">Continue to Migration Setup</span>
          <span class="iconify text-xl" data-icon="mdi:arrow-right-circle"></span>
        </button>
      </div>
    </div>

    <!-- Update Available Modal -->
    <div id="updateModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100] hidden">
      <div id="updateModalContent" class="bg-white rounded-2xl shadow-2xl max-w-md w-full mx-4 overflow-hidden transform scale-90 opacity-0 transition-all duration-300">
        <!-- Header -->
        <div class="px-6 py-5" style="background: linear-gradient(135deg, #1E22AA, #E5005A);">
          <div class="flex items-center gap-3">
            <div class="bg-white bg-opacity-20 rounded-xl p-2.5">
              <span class="iconify text-white text-2xl" data-icon="mdi:update"></span>
            </div>
            <div>
              <h3 class="text-white font-bold text-lg">Update Available!</h3>
              <p class="text-white text-opacity-80 text-xs" id="updateVersionInfo">New version available</p>
            </div>
          </div>
        </div>

        <!-- Body -->
        <div class="px-6 py-4">
          <!-- Version badge -->
          <div class="flex items-center gap-2 mb-3">
            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-gray-100 text-gray-600">
              <span class="iconify" data-icon="mdi:tag-outline"></span>
              Current: <span id="updateCurrentVersion">-</span>
            </span>
            <span class="iconify text-gray-400" data-icon="mdi:arrow-right"></span>
            <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold text-white" style="background: linear-gradient(135deg, #1E22AA, #E5005A);">
              <span class="iconify" data-icon="mdi:star"></span>
              Latest: <span id="updateLatestVersion">-</span>
            </span>
          </div>

          <!-- What's New -->
          <div class="mb-4">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 flex items-center gap-1.5">
              <span class="iconify" data-icon="mdi:text-box-outline"></span>
              What's New
            </p>
            <div id="updateReleaseNotes" class="text-sm text-gray-700 bg-gray-50 rounded-xl p-3 max-h-40 overflow-y-auto leading-relaxed border border-gray-100" style="white-space: pre-wrap;">
              No release notes available.
            </div>
          </div>

          <!-- Published date -->
          <p id="updatePublishedAt" class="text-xs text-gray-400 flex items-center gap-1 mb-4">
            <span class="iconify" data-icon="mdi:clock-outline"></span>
            <span>-</span>
          </p>
        </div>

        <!-- Footer buttons -->
        <div class="px-6 pb-5 flex gap-3">
          <button id="updateLaterBtn" onclick="closeUpdateModal()" class="flex-1 py-2.5 rounded-xl text-sm font-semibold text-gray-500 bg-gray-100 hover:bg-gray-200 transition-colors flex items-center justify-center gap-2">
            <span class="iconify" data-icon="mdi:clock-outline"></span>
            Maybe Later
          </button>
          <button id="updateDownloadBtn" onclick="downloadUpdate()" class="flex-1 py-2.5 rounded-xl text-sm font-semibold text-white transition-all hover:shadow-lg hover:scale-[1.02] flex items-center justify-center gap-2" style="background: linear-gradient(135deg, #1E22AA, #E5005A);">
            <span class="iconify" data-icon="mdi:download"></span>
            Download
          </button>
        </div>
      </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed bottom-6 right-6 flex flex-col gap-3 z-50"></div>

    <!-- Load modular JS files -->
    <script src="js/i18n.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>

    <script>
      // Custom Toast Function
      function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        const isSuccess = type === 'success';
        
        toast.className = `flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl text-sm font-medium transition-all duration-300 transform translate-y-10 opacity-0 ${
          isSuccess ? 'bg-white border-l-4 border-green-500 text-gray-800' : 'bg-white border-l-4 border-red-500 text-gray-800'
        }`;
        
        toast.innerHTML = `
          <span class="iconify text-2xl ${isSuccess ? 'text-green-500' : 'text-red-500'}" data-icon="${isSuccess ? 'mdi:check-circle' : 'mdi:alert-circle'}"></span>
          <span>${message}</span>
        `;
        
        document.getElementById('toastContainer').appendChild(toast);
        
        // Animate in
        requestAnimationFrame(() => {
          toast.classList.remove('translate-y-10', 'opacity-0');
        });

        // Remove after 4 seconds
        setTimeout(() => {
          toast.classList.add('translate-y-10', 'opacity-0');
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }

      // Toggle Password Visibility
      function togglePasswordVisibility(inputId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(inputId + '-icon');
        if (input.type === 'password') {
          input.type = 'text';
          icon.setAttribute('data-icon', 'mdi:eye-off');
        } else {
          input.type = 'password';
          icon.setAttribute('data-icon', 'mdi:eye');
        }
      }

      // ==================== UPDATE CHECKER ====================
      let updateDownloadUrl = '';

      function showUpdateModal(data) {
        document.getElementById('updateCurrentVersion').textContent = data.currentVersion;
        document.getElementById('updateLatestVersion').textContent = data.latestVersion;
        document.getElementById('updateVersionInfo').textContent = `${data.releaseName} is now available`;
        document.getElementById('updateReleaseNotes').textContent = data.releaseNotes || 'No release notes available.';
        
        if (data.publishedAt) {
          const date = new Date(data.publishedAt);
          document.getElementById('updatePublishedAt').querySelector('span:last-child').textContent = 
            `Published on ${date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}`;
        }

        updateDownloadUrl = data.downloadUrl;
        
        const modal = document.getElementById('updateModal');
        const content = document.getElementById('updateModalContent');
        modal.classList.remove('hidden');
        
        // Animate in
        requestAnimationFrame(() => {
          content.classList.remove('scale-90', 'opacity-0');
          content.classList.add('scale-100', 'opacity-100');
        });
      }

      function closeUpdateModal() {
        const content = document.getElementById('updateModalContent');
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-90', 'opacity-0');
        setTimeout(() => {
          document.getElementById('updateModal').classList.add('hidden');
        }, 300);
      }

      function downloadUpdate() {
        if (updateDownloadUrl && window.electronAPI) {
          window.electronAPI.openExternal(updateDownloadUrl);
        } else if (updateDownloadUrl) {
          window.open(updateDownloadUrl, '_blank');
        }
        closeUpdateModal();
      }

      // Check backend health and updates on load
      window.addEventListener('DOMContentLoaded', () => {
        // Check backend health
        setTimeout(async () => {
          if (!window.API_URL) return;
          try {
            const res = await axios.get(`${window.API_URL}/api/config`);
            if (res.status === 200) {
              showToast('Backend connected successfully!', 'success');
            }
          } catch (error) {
            showToast('Failed to connect to backend.', 'error');
          }
        }, 500);

        // Check for updates (only in Electron context)
        setTimeout(async () => {
          if (window.electronAPI && window.electronAPI.checkForUpdates) {
            try {
              const result = await window.electronAPI.checkForUpdates();
              if (result.updateAvailable) {
                showUpdateModal(result);
              }
            } catch (err) {
              console.log('Update check skipped:', err.message);
            }
          }
        }, 2000);
      });
    </script>
  </body>
</html>
